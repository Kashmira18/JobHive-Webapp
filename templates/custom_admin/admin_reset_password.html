<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Invalid Link – JobHive Admin</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
            rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
            rel="stylesheet" />
        <style>
    :root{--navy:#0f1535;--accent:#1ab8e8;--border:rgba(255,255,255,0.10);--muted:rgba(255,255,255,0.50);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
    .top-bar{position:fixed;top:0;left:0;right:0;height:4px;background:var(--accent);z-index:10;}
    .wrap{width:100%;max-width:380px;padding:0 16px;text-align:center;}
    .brand-icon{width:48px;height:48px;background:var(--accent);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:800;font-size:20px;color:#fff;margin-bottom:12px;}
    .brand-name{font-family:'Sora',sans-serif;font-weight:700;font-size:1.1rem;color:#fff;display:block;}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:2px;display:block;margin-bottom:32px;}
    .card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:32px 28px;}
    .err-icon{width:56px;height:56px;background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff8a8a;margin:0 auto 16px;}
    .card h5{font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;margin-bottom:8px;}
    .card p{font-size:12.5px;color:var(--muted);line-height:1.65;margin-bottom:22px;}
    .btn-back{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-family:'Sora',sans-serif;font-weight:700;font-size:13px;text-decoration:none;transition:background .2s,transform .15s;}
    .btn-back:hover{background:#13a3cf;color:#fff;transform:translateY(-1px);}
    .footer-note{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;}
  </style>
    </head>
    <body>
        <div class="top-bar"></div>

        <div class="wrap">
            <div class="brand-icon">J</div>
            <span class="brand-name">JobHive Admin</span>
            <span class="brand-sub">Password Recovery</span>

            <div class="card">
                <div class="err-icon"><i
                        class="bi bi-exclamation-triangle"></i></div>
                <h5>Invalid or Expired Link</h5>
                <p>This password reset link is either invalid or has already
                    expired. Reset links are valid for 24 hours
                    only.<br><br>Please request a new reset link from the forgot
                    password page.</p>
                <a href="{% url 'custom_admin:forgot_password' %}"
                    class="btn-back">
                    <i class="bi bi-arrow-left"></i> Request New Link
                </a>
            </div>

            <div class="footer-note">© 2025 JobHive · Admin Panel</div>
        </div>
    </body>
</html>
